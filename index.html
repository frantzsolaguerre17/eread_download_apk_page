<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eRead - Téléchargement</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="container">

    <img src="images/logo.png" class="logo" alt="Logo eRead">

    <h1>eRead</h1>
    <p>Application de lecture numérique interactive</p>

    <a id="downloadBtn" class="btn">Télécharger eRead</a>

    <div class="counter">
        📥 Téléchargements : <span id="count">0</span>
    </div>

    <div class="install-info">
        <img src="images/unknown__sources.jpg"
             alt="Sources inconnues">
        <p>
            ⚠️ Si Android bloque l'installation,
            activez <strong>« Sources inconnues »</strong>
            dans les paramètres de sécurité de votre appareil.
        </p>
    </div>
    <div class="footer">
        Version officielle Android
    </div>


</div>


<script>

    const SUPABASE_URL = "https://ujuswyzvftkkjklktwxv.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqdXN3eXp2ZnRra2prbGt0d3h2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc3OTg5NTcsImV4cCI6MjA3MzM3NDk1N30.7QGTmDz_yaGo4B4XXHBA71PivmTElC5Zx4sjpuv_w8Y";
    const apkLink = "https://github.com/frantzsolaguerre17/eread_download_apk_page/releases/download/v1.0.1/eread.apk";

    const downloadBtn = document.getElementById("downloadBtn");
    const countEl = document.getElementById("count");

    /* =========================
       1. Charger le compteur
    ========================= */
    async function loadCount() {
        try {
            const res = await fetch(
                `${"https://ujuswyzvftkkjklktwxv.supabase.co"}/rest/v1/apk_downloads?select=count&id=eq.2f1949e5-97cb-4b28-a756-800fbff3aa19&select=count`,
                {
                    method: "GET",
                    headers: {
                        apikey: SUPABASE_KEY,
                        Authorization: `Bearer ${"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqdXN3eXp2ZnRra2prbGt0d3h2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc3OTg5NTcsImV4cCI6MjA3MzM3NDk1N30.7QGTmDz_yaGo4B4XXHBA71PivmTElC5Zx4sjpuv_w8Y"}`
                    }
                }
            );

            const data = await res.json();

            if (data && data.length > 0 && countEl) {
                countEl.innerText = data[0].count;
            }
        } catch (err) {
            console.error("Erreur loadCount:", err);
        }
    }


    async function increaseCount() {

        const current = Number(countEl.innerText || 0);
        updateCount(current + 1);

        try {
            const res = await fetch(
                `${"https://ujuswyzvftkkjklktwxv.supabase.co"}/rest/v1/rpc/increment_downloads`,
                {
                    method: "POST",
                    headers: {
                        apikey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqdXN3eXp2ZnRra2prbGt0d3h2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc3OTg5NTcsImV4cCI6MjA3MzM3NDk1N30.7QGTmDz_yaGo4B4XXHBA71PivmTElC5Zx4sjpuv_w8Y",
                        Authorization: `Bearer ${"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqdXN3eXp2ZnRra2prbGt0d3h2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc3OTg5NTcsImV4cCI6MjA3MzM3NDk1N30.7QGTmDz_yaGo4B4XXHBA71PivmTElC5Zx4sjpuv_w8Y"}`,                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({})
                }
            );

            const data = await res.text();
            console.log("RPC response:", data);

        } catch (err) {
            console.error("Erreur increaseCount:", err);
        }

        setTimeout(loadCount, 800);
    }



    /* =========================
       3. Click download
    ========================= */
    if (downloadBtn) {
        downloadBtn.addEventListener("click", function () {
            // incrément en arrière-plan (ne bloque pas le download)
            increaseCount();

            // téléchargement immédiat
            window.location.href = apkLink;
        });
    }


    /*=========================
        ANIMATION COUNTER
    ========================= */
    function updateCount(newValue) {
        popEffect();
        const current = Number(countEl.innerText || 0);

        // animation simple
        const duration = 600;
        const steps = 30;
        const increment = (newValue - current) / steps;

        let i = 0;

        const interval = setInterval(() => {
            i++;
            const value = Math.round(current + increment * i);
            countEl.innerText = value;

            if (i >= steps) {
                clearInterval(interval);
                countEl.innerText = newValue;
            }
        }, duration / steps);

    }


    function subscribeToChanges() {
        const supabase = window.supabase.createClient(
            "https://ujuswyzvftkkjklktwxv.supabase.co",
            "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVqdXN3eXp2ZnRra2prbGt0d3h2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc3OTg5NTcsImV4cCI6MjA3MzM3NDk1N30.7QGTmDz_yaGo4B4XXHBA71PivmTElC5Zx4sjpuv_w8Y"
        );

        supabase
            .channel('apk_downloads_channel')
            .on(
                'postgres_changes',
                {
                    event: '*',
                    schema: 'public',
                    table: 'apk_downloads'
                },
                (payload) => {
                    console.log("Change detected:", payload);

                    const newCount = payload.new.count;
                    updateCount(newCount);
                }
            )
            .subscribe();
    }

    function popEffect() {
        countEl.classList.add("pop");
        setTimeout(() => countEl.classList.remove("pop"), 200);
    }


    /* =========================
      Init page
   ========================= */
    document.addEventListener("DOMContentLoaded", () => {
        loadCount();
        subscribeToChanges();

    });

</script>

</body>
</html>
