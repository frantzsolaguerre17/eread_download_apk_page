<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eRead - Téléchargement</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4c0ea1, #8e44ad);

            display: flex;
            justify-content: center;
            align-items: center;

            min-height: 100vh;
            padding: 15px;
            box-sizing: border-box;
        }

        /* CARD PLUS COMPACTE */
        .container {
            width: 90%;
            max-width: 400px;
            margin: auto;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
        }

        /* LOGO */
        img.logo {
            max-width: 120px;
            width: 100%;
            height: auto;
        }

        h1 {
            font-size: clamp(24px, 5vw, 32px);
        }

        p {
            font-size: clamp(14px, 3vw, 16px);
        }

        /* BUTTON */
        .btn {
            display: block;
            width: 100%;
            box-sizing: border-box;
            padding: 14px 20px;
            background: #673ab7;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #5a2ea6;
        }

        /* COUNTER */
        .counter {
            margin-top: 15px;
            font-size: 13px;
            opacity: 0.9;
        }

        /* FOOTER */
        .footer {
            margin-top: 10px;
            font-size: 10px;
            opacity: 0.7;
        }

        /* 🔥 MOBILE ENCORE PLUS PETIT */
        @media (max-width: 480px) {
            .container {
                max-width: 300px;
                padding: 20px;
            }

            h1 {
                font-size: 20px;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <img src="images/logo.png" class="logo" alt="Logo eRead">

    <h1>eRead</h1>
    <p>Application de lecture numérique interactive</p>

    <a id="downloadBtn" class="btn">Télécharger eRead</a>

   <!-- <div class="counter">
        📥 Téléchargements : <span id="count">0</span>
    </div>-->

    <div class="footer">
        Version officielle Android
    </div>

</div>

<script>
    const apkLink = "https://github.com/frantzsolaguerre17/eRead/releases/download/v1.0.0/eread.apk";

    let count = localStorage.getItem("downloads") || 0;
    document.getElementById("count").innerText = count;

    document.getElementById("downloadBtn").onclick = function () {
        window.location.href = apkLink;

        count++;
        localStorage.setItem("downloads", count);
        document.getElementById("count").innerText = count;
    };
</script>

</body>
</html>
