<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eRead - Téléchargement</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4c0ea1, #8e44ad);

            display: flex;
            justify-content: center;
            align-items: center;

            min-height: 100vh;
            padding: 15px;
            box-sizing: border-box;
        }

        /* CARD PLUS COMPACTE */
        .container {
            width: 100%;
            max-width: 340px;   /* 🔥 réduit la largeur */
            padding: 25px;      /* 🔥 moins de padding */
            background: linear-gradient(135deg, #4c0ea1, #8e44ad);
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            text-align: center;
            color: white;
        }

        /* LOGO */
        .logo {
            width: 75px;
            height: 75px;
            border-radius: 18px;
            margin-bottom: 12px;
            background: white;
            padding: 3px;
        }

        /* TITLE */
        h1 {
            font-size: 25px;
            margin-bottom: 5px;
        }

        /* TEXT */
        p {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 18px;
        }

        /* BUTTON */
        .btn {
            display: block;
            width: 100%;
            box-sizing: border-box;
            padding: 14px 20px;
            background: orange;
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* COUNTER */
        .counter {
            margin-top: 15px;
            font-size: 13px;
            opacity: 0.9;
        }

        /* FOOTER */
        .footer {
            margin-top: 10px;
            font-size: 10px;
            opacity: 0.7;
        }

        /* 🔥 MOBILE ENCORE PLUS PETIT */
        @media (max-width: 480px) {
            .container {
                max-width: 300px;
                padding: 20px;
            }

            h1 {
                font-size: 20px;
            }

            .btn {
                width: 100%;
            }
        }

        .install-info {
            margin-top: 20px;
            text-align: center;
        }

        .install-info img {
            width: 120px;
            max-width: 100%;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .install-info p {
            font-size: 12px;
            line-height: 1.5;
            color: white;
            opacity: 0.95;
        }
    </style>
</head>

<body>

<div class="container">

    <img src="images/logo.png" class="logo" alt="Logo eRead">

    <h1>eRead</h1>
    <p>Application de lecture numérique interactive</p>

    <a id="downloadBtn" class="btn">Télécharger eRead</a>

   <!-- <div class="counter">
        📥 Téléchargements : <span id="count">0</span>
    </div>-->

    <div class="install-info">
        <img src="images/unknown__sources.jpg"
             alt="Sources inconnues">
        <p>
            ⚠️ Si Android bloque l'installation,
            activez <strong>« Sources inconnues »</strong>
            dans les paramètres de sécurité de votre appareil.
        </p>
    </div>
    <div class="footer">
        Version officielle Android
    </div>


</div>

<script>
    const apkLink = "https://github.com/frantzsolaguerre17/eread_download_apk_page/releases/download/v1.0.0/eread.apk";

    document.getElementById("downloadBtn").onclick = function () {
        window.location.href = apkLink;
    };
</script>

</body>
</html>
