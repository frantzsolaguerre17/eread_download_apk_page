<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eRead - Téléchargement</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4c0ea1, #8e44ad);

            display: flex;
            justify-content: center;
            align-items: center;

            min-height: 100vh;
            padding: 15px;
            box-sizing: border-box;
        }

        /* CARD PLUS COMPACTE */
        .container {
            width: 100%;
            max-width: 340px;   /* 🔥 réduit la largeur */
            padding: 25px;      /* 🔥 moins de padding */
            background: linear-gradient(135deg, #4c0ea1, #8e44ad);
            border-radius: 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            text-align: center;
            color: white;
        }

        /* LOGO */
        .logo {
            width: 75px;
            height: 75px;
            border-radius: 18px;
            margin-bottom: 12px;
            background: white;
            padding: 3px;
        }

        /* TITLE */
        h1 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        /* TEXT */
        p {
            font-size: 13px;
            opacity: 0.9;
            margin-bottom: 18px;
        }

        /* BUTTON */
        .btn {
            display: inline-block;
            padding: 12px 20px;
            background: #ff7a00;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 12px rgba(255, 122, 0, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
        }

        /* COUNTER */
        .counter {
            margin-top: 15px;
            font-size: 13px;
            opacity: 0.9;
        }

        /* FOOTER */
        .footer {
            margin-top: 10px;
            font-size: 10px;
            opacity: 0.7;
        }

        /* 🔥 MOBILE ENCORE PLUS PETIT */
        @media (max-width: 480px) {
            .container {
                max-width: 300px;
                padding: 20px;
            }

            h1 {
                font-size: 20px;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <img src="images/logo.png" class="logo" alt="Logo eRead">

    <h1>eRead</h1>
    <p>Application de lecture numérique interactive</p>

    <a id="downloadBtn" class="btn">Télécharger l’APK</a>

    <div class="counter">
        📥 Téléchargements : <span id="count">0</span>
    </div>

    <div class="footer">
        Version officielle Android
    </div>

</div>

<script>
    const apkLink = "https://github.com/frantzsolaguerre17/eRead/releases/download/v1.0.0/eread.apk";

    let count = localStorage.getItem("downloads") || 0;
    document.getElementById("count").innerText = count;

    document.getElementById("downloadBtn").onclick = function () {
        window.location.href = apkLink;

        count++;
        localStorage.setItem("downloads", count);
        document.getElementById("count").innerText = count;
    };
</script>

</body>
</html>
